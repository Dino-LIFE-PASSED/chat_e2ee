<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat E2EE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      /* dvh shrinks when the virtual keyboard opens on mobile */
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    aside {
      width: 280px;
      min-width: 280px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
    }

    .my-key-box {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #334155;
    }
    .my-key-box .label {
      font-size: 0.68rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .my-key-row { display: flex; align-items: center; gap: 0.5rem; }
    .my-key-id {
      font-family: monospace;
      font-size: 0.8rem;
      color: #38bdf8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contacts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #334155;
    }
    .contacts-header span {
      font-size: 0.68rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .contacts-header-actions { display: flex; gap: 0.4rem; align-items: center; }

    .notif-btn {
      position: relative;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      font-size: 0.95rem;
      line-height: 1;
      min-width: 36px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .notif-btn:hover { background: #334155; color: #e2e8f0; }
    .notif-btn.has-requests { color: #fbbf24; }
    .notif-count {
      position: absolute;
      top: -2px; right: -2px;
      background: #ef4444;
      color: white;
      border-radius: 999px;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
    }

    #notif-panel {
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .notif-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .notif-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-top: 1px solid #1e293b;
      gap: 0.5rem;
    }
    .notif-item-info { flex: 1; min-width: 0; }
    .notif-from { font-size: 0.72rem; font-family: monospace; color: #94a3b8; }
    .notif-time { font-size: 0.68rem; color: #475569; margin-top: 1px; }

    #contacts-list { list-style: none; flex: 1; overflow-y: auto; }
    .contact-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .contact-item:hover { background: #0f172a; }
    .contact-item.active { background: #0f172a; border-left-color: #38bdf8; }
    .contact-name { font-size: 0.9rem; }
    .contact-key  { font-size: 0.7rem; font-family: monospace; color: #64748b; margin-top: 1px; }

    .sidebar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid #334155;
      /* push above home indicator on iPhone */
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
    }

    /* ── Main chat area ──────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 0.5rem;
      text-align: center;
      padding: 2rem;
    }
    #empty-state .icon { font-size: 2.5rem; }

    #chat-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-pane.hidden { display: none; }

    #chat-header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #334155;
      background: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 52px;
    }
    /* Back button — only visible on mobile */
    #btn-back {
      display: none;
      background: none;
      border: none;
      color: #38bdf8;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.25rem 0.25rem 0.25rem 0;
      min-width: 36px;
      min-height: 36px;
      align-items: center;
      justify-content: center;
    }
    #chat-name { font-weight: 600; flex-shrink: 0; }
    #rename-input {
      font-weight: 600;
      font-size: 1rem;
      background: #0f172a;
      border: 1px solid #38bdf8;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 0.15rem 0.4rem;
      width: 140px;
    }
    #rename-input:focus { outline: none; }
    .e2ee-badge {
      font-size: 0.68rem;
      background: #064e3b;
      color: #34d399;
      border: 1px solid #059669;
      padding: 1px 7px;
      border-radius: 999px;
      white-space: nowrap;
    }
    #chat-key-hint {
      font-size: 0.72rem;
      color: #475569;
      font-family: monospace;
      margin-left: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      /* Momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 75%;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .msg .text { word-break: break-word; }
    .msg .time { font-size: 0.7rem; margin-top: 3px; opacity: 0.55; }
    .msg.mine   { background: #1d4ed8; align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg.theirs { background: #1e293b; border: 1px solid #334155; align-self: flex-start; border-bottom-left-radius: 3px; }

    .input-row {
      padding: 0.65rem 1rem;
      border-top: 1px solid #334155;
      background: #1e293b;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      /* stay above home indicator */
      padding-bottom: calc(0.65rem + env(safe-area-inset-bottom, 0px));
    }
    #msg-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 22px;
      color: #e2e8f0;
      padding: 0.55rem 1rem;
      font-size: 1rem; /* 16px — prevents iOS auto-zoom */
      line-height: 1.4;
    }
    #msg-input:focus { outline: none; border-color: #38bdf8; }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: flex-end; /* bottom sheet on mobile */
      justify-content: center;
      z-index: 100;
      padding: env(safe-area-inset-top, 0px) 0 0;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px 16px 0 0;
      padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      /* allow scrolling inside modal if content is tall */
      max-height: 85dvh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: #475569;
      border-radius: 999px;
      margin: 0 auto 0.5rem;
    }
    .modal h3 { color: #f1f5f9; font-size: 1rem; }

    /* ── Shared buttons / inputs ─────────────────── */
    button {
      background: #334155;
      border: none;
      color: #e2e8f0;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover { background: #475569; }
    button:active { opacity: 0.8; }
    button.primary { background: #38bdf8; color: #0f172a; font-weight: 600; }
    button.primary:hover { background: #7dd3fc; }
    button.icon-btn { background: none; padding: 0.3rem 0.4rem; color: #64748b; border-radius: 6px; min-height: 36px; }
    button.icon-btn:hover { background: #334155; color: #e2e8f0; }
    button.danger { background: #7f1d1d; color: #fca5a5; }
    button.danger:hover { background: #991b1b; }

    label { font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 0.25rem; }
    textarea, input[type="text"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.55rem 0.75rem;
      font-family: monospace;
      font-size: 1rem; /* 16px — prevents iOS auto-zoom */
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus { outline: none; border-color: #38bdf8; }

    .error { color: #f87171; font-size: 0.85rem; }
    .hidden { display: none !important; }

    #loading-screen {
      position: fixed; inset: 0;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: #64748b;
    }

    /* ── Mobile layout ───────────────────────────── */
    @media (max-width: 640px) {
      /* On mobile, sidebar and chat each take the full screen */
      aside {
        width: 100%;
        min-width: unset;
        position: fixed;
        inset: 0;
        z-index: 10;
        /* push content below status bar on iPhone */
        padding-top: env(safe-area-inset-top, 0px);
      }

      /* When a chat is open, hide the sidebar */
      body.chat-open aside { display: none; }

      /* When no chat is open, hide the main area */
      body:not(.chat-open) main { display: none; }

      main {
        position: fixed;
        inset: 0;
        padding-top: env(safe-area-inset-top, 0px);
      }

      /* Show the back button */
      #btn-back { display: inline-flex; }

      /* Wider message bubbles on small screens */
      .msg { max-width: 85%; }

      /* Full-width modal (bottom sheet) is already set above */
      .modal-overlay { align-items: flex-end; }
    }
  </style>
</head>
<body>

<div id="loading-screen">Loading keys…</div>

<!-- ── Sidebar ───────────────────────────────────── -->
<aside>
  <div class="my-key-box">
    <div class="label">Your public key (share this)</div>
    <div class="my-key-row">
      <span class="my-key-id" id="my-key-display"></span>
      <button id="btn-copy-key" onclick="copyMyKey()">Copy</button>
    </div>
  </div>

  <div class="contacts-header">
    <span>Contacts</span>
    <div class="contacts-header-actions">
      <button class="notif-btn hidden" id="btn-notif" onclick="toggleNotifPanel()" title="Friend requests">
        🔔
        <span class="notif-count" id="notif-count">0</span>
      </button>
      <button onclick="openModal()">+ Add</button>
    </div>
  </div>

  <div id="notif-panel" class="hidden">
    <div class="notif-panel-header">
      <span>Friend Requests</span>
      <button class="icon-btn" onclick="document.getElementById('notif-panel').classList.add('hidden')">✕</button>
    </div>
    <div id="notif-list"></div>
  </div>

  <ul id="contacts-list"></ul>

  <div class="sidebar-footer">
    <button class="danger" style="width:100%" onclick="logout()">Logout</button>
  </div>
</aside>

<!-- ── Main area ─────────────────────────────────── -->
<main>
  <div id="empty-state">
    <div class="icon">💬</div>
    <p>Select a contact or add one to start chatting.</p>
    <p style="font-size:0.8rem;margin-top:0.25rem;color:#334155">Messages are encrypted before leaving your browser.</p>
  </div>

  <div id="chat-pane" class="hidden">
    <div id="chat-header">
      <!-- Back button: mobile only -->
      <button id="btn-back" onclick="backToContacts()" aria-label="Back">‹</button>

      <span id="chat-name"></span>
      <button class="icon-btn" id="btn-rename" onclick="startRename()" title="Rename">✏️</button>
      <input id="rename-input" type="text" class="hidden"
             onblur="finishRename()"
             onkeydown="onRenameKey(event)" />

      <span class="e2ee-badge">🔒 E2EE</span>
      <span id="chat-key-hint"></span>
    </div>

    <div id="messages"></div>

    <div class="input-row">
      <input id="msg-input" type="text" placeholder="Message…" onkeydown="onEnter(event)" />
      <button class="primary" onclick="sendMessage()" style="border-radius:22px;padding:0.55rem 1.1rem;">Send</button>
    </div>
  </div>
</main>

<!-- ── Add Contact Modal ─────────────────────────── -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Add Contact</h3>
    <div>
      <label>Their Public Key</label>
      <textarea id="contact-key-input" rows="3" placeholder="Paste their public key (base64)…"></textarea>
    </div>
    <div>
      <label>Nickname <span style="color:#475569">(optional)</span></label>
      <input type="text" id="contact-name-input" placeholder="e.g. Alice" />
    </div>
    <p id="modal-error" class="error hidden"></p>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end">
      <button onclick="document.getElementById('modal-overlay').classList.add('hidden')">Cancel</button>
      <button class="primary" onclick="addContact()">Add</button>
    </div>
  </div>
</div>

<script src="crypto.js"></script>
<script>
  // ── Bootstrap ─────────────────────────────────────────────────────────────

  const myPrivateHex = localStorage.getItem('privateKeyHex');
  const myPublicKey  = localStorage.getItem('publicKey');

  if (!myPrivateHex || !myPublicKey) { location.href = '/'; }

  const CONTACTS_KEY = `contacts_${myPublicKey}`;

  let contacts        = JSON.parse(localStorage.getItem(CONTACTS_KEY) || '{}');
  let pendingRequests = [];
  const msgStore      = {};

  let activeContact    = null;
  let privateCryptoKey = null;
  let ws               = null;

  function saveContacts() { localStorage.setItem(CONTACTS_KEY, JSON.stringify(contacts)); }
  function syncContacts() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'update_contacts', contacts }));
    }
  }

  // ── Async init ────────────────────────────────────────────────────────────

  (async () => {
    try {
      const result = await E2EE.importFromHex(myPrivateHex);
      privateCryptoKey = result.privateCryptoKey;

      document.getElementById('my-key-display').textContent = E2EE.shortId(myPublicKey);
      document.getElementById('loading-screen').style.display = 'none';

      renderContacts();
      connectWS();
    } catch (e) {
      console.error('Key import failed:', e);
      logout();
    }
  })();

  // ── WebSocket ─────────────────────────────────────────────────────────────

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}`);

    ws.onopen = () => ws.send(JSON.stringify({ type: 'identify', publicKey: myPublicKey }));

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'contacts') {
        if (Object.keys(msg.contacts).length > 0) {
          contacts = msg.contacts;
          saveContacts();
        } else if (Object.keys(contacts).length > 0) {
          syncContacts();
        }
        renderContacts();
      }

      if (msg.type === 'history') {
        for (const m of msg.messages) await processMessage(m);
        renderMessages();
      }

      if (msg.type === 'message') {
        await processMessage(msg);
        renderMessages();
      }

      if (msg.type === 'friend_request')  addPendingRequest(msg.request);
      if (msg.type === 'friend_requests') msg.requests.forEach(addPendingRequest);
    };

    ws.onclose = () => setTimeout(connectWS, 2000);
  }

  // ── Message processing ────────────────────────────────────────────────────

  async function processMessage(m) {
    const isMine     = m.senderKey === myPublicKey;
    const contactKey = isMine ? m.recipientKey : m.senderKey;

    if (!msgStore[contactKey]) msgStore[contactKey] = [];
    if (msgStore[contactKey].find(x => x.id === m.id)) return;

    let text;
    try {
      text = await E2EE.decryptMessage(m.encrypted, privateCryptoKey, contactKey);
    } catch {
      text = '⚠️ Could not decrypt.';
    }

    msgStore[contactKey].push({ id: m.id, dir: isMine ? 'out' : 'in', text, ts: m.timestamp });
  }

  // ── Contacts ──────────────────────────────────────────────────────────────

  function renderContacts() {
    const list = document.getElementById('contacts-list');
    list.innerHTML = '';
    for (const [key, { name }] of Object.entries(contacts)) {
      const li = document.createElement('li');
      li.className = 'contact-item' + (key === activeContact ? ' active' : '');
      li.innerHTML = `
        <div class="contact-name">${esc(name)}</div>
        <div class="contact-key">${E2EE.shortId(key)}</div>
      `;
      li.onclick = () => openConversation(key);
      list.appendChild(li);
    }
  }

  function openConversation(key) {
    activeContact = key;
    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('chat-pane').classList.remove('hidden');
    document.getElementById('chat-name').textContent     = contacts[key]?.name || E2EE.shortId(key);
    document.getElementById('chat-key-hint').textContent = E2EE.shortId(key);
    document.body.classList.add('chat-open'); // mobile: switch to chat pane
    renderContacts();
    renderMessages();
    document.getElementById('msg-input').focus();
  }

  function backToContacts() {
    document.body.classList.remove('chat-open'); // mobile: switch back to sidebar
    activeContact = null;
    document.getElementById('chat-pane').classList.add('hidden');
    document.getElementById('empty-state').classList.remove('hidden');
    renderContacts();
  }

  // ── Rename contact ────────────────────────────────────────────────────────

  function startRename() {
    const nameEl  = document.getElementById('chat-name');
    const inputEl = document.getElementById('rename-input');
    const btnEl   = document.getElementById('btn-rename');
    inputEl.value = contacts[activeContact]?.name || '';
    nameEl.classList.add('hidden');
    btnEl.classList.add('hidden');
    inputEl.classList.remove('hidden');
    inputEl.focus();
    inputEl.select();
  }

  function finishRename() {
    const nameEl  = document.getElementById('chat-name');
    const inputEl = document.getElementById('rename-input');
    const btnEl   = document.getElementById('btn-rename');
    const newName = inputEl.value.trim();
    if (newName && activeContact) {
      contacts[activeContact].name = newName;
      saveContacts();
      syncContacts();
      nameEl.textContent = newName;
      renderContacts();
    }
    nameEl.classList.remove('hidden');
    btnEl.classList.remove('hidden');
    inputEl.classList.add('hidden');
  }

  function onRenameKey(e) {
    if (e.key === 'Enter')  e.target.blur();
    if (e.key === 'Escape') { e.target.value = ''; e.target.blur(); }
  }

  // ── Messages ──────────────────────────────────────────────────────────────

  function renderMessages() {
    if (!activeContact) return;
    const msgs      = (msgStore[activeContact] || []).slice().sort((a, b) => a.ts < b.ts ? -1 : 1);
    const container = document.getElementById('messages');
    container.innerHTML = msgs.map(m => `
      <div class="msg ${m.dir === 'out' ? 'mine' : 'theirs'}">
        <div class="text">${esc(m.text)}</div>
        <div class="time">${fmtTime(m.ts)}</div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !activeContact || !privateCryptoKey) return;
    input.value = '';

    const ts = new Date().toISOString();
    let encrypted;
    try {
      encrypted = await E2EE.encryptMessage(text, privateCryptoKey, activeContact);
    } catch (e) {
      alert('Encryption failed: ' + e.message);
      return;
    }

    ws.send(JSON.stringify({ type: 'send', recipientKey: activeContact, encrypted }));

    if (!msgStore[activeContact]) msgStore[activeContact] = [];
    msgStore[activeContact].push({ id: `local-${Date.now()}`, dir: 'out', text, ts });
    renderMessages();
  }

  function onEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── Friend requests ───────────────────────────────────────────────────────

  function addPendingRequest(req) {
    if (contacts[req.from]) return;
    if (!pendingRequests.find(r => r.id === req.id)) pendingRequests.push(req);
    updateNotifBadge();
    if (!document.getElementById('notif-panel').classList.contains('hidden')) renderNotifPanel();
  }

  function updateNotifBadge() {
    const btn   = document.getElementById('btn-notif');
    const count = pendingRequests.length;
    document.getElementById('notif-count').textContent = count;
    btn.classList.toggle('hidden', count === 0);
    btn.classList.toggle('has-requests', count > 0);
  }

  function toggleNotifPanel() {
    const panel = document.getElementById('notif-panel');
    const isHidden = panel.classList.contains('hidden');
    if (isHidden) { renderNotifPanel(); panel.classList.remove('hidden'); }
    else          { panel.classList.add('hidden'); }
  }

  function renderNotifPanel() {
    document.getElementById('notif-list').innerHTML = pendingRequests.map(req => `
      <div class="notif-item">
        <div class="notif-item-info">
          <div style="font-size:0.82rem">wants to connect</div>
          <div class="notif-from">${esc(E2EE.shortId(req.from))}</div>
          <div class="notif-time">${fmtTime(req.timestamp)}</div>
        </div>
        <button data-id="${req.id}" data-from="${esc(req.from)}" onclick="acceptRequest(this)">Add</button>
      </div>
    `).join('');
  }

  function acceptRequest(btn) {
    const id      = btn.dataset.id;
    const fromKey = btn.dataset.from;
    pendingRequests = pendingRequests.filter(r => String(r.id) !== id);
    updateNotifBadge();
    renderNotifPanel();
    document.getElementById('contact-key-input').value  = fromKey;
    document.getElementById('contact-name-input').value = '';
    document.getElementById('notif-panel').classList.add('hidden');
    openModal();
  }

  // ── Add Contact ───────────────────────────────────────────────────────────

  function openModal() {
    document.getElementById('modal-error').classList.add('hidden');
    document.getElementById('modal-overlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('contact-key-input').focus(), 100);
  }

  function maybeCloseModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
  }

  async function addContact() {
    const key     = document.getElementById('contact-key-input').value.trim();
    const name    = document.getElementById('contact-name-input').value.trim();
    const errorEl = document.getElementById('modal-error');
    errorEl.classList.add('hidden');

    if (!key) { errorEl.textContent = 'Paste a public key.'; errorEl.classList.remove('hidden'); return; }
    if (key === myPublicKey) { errorEl.textContent = "That's your own public key."; errorEl.classList.remove('hidden'); return; }

    try {
      await E2EE.validatePublicKey(key);
    } catch {
      errorEl.textContent = 'Invalid public key format.';
      errorEl.classList.remove('hidden');
      return;
    }

    contacts[key] = { name: name || E2EE.shortId(key) };
    saveContacts();
    syncContacts();

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'friend_request', to: key }));
    }

    document.getElementById('modal-overlay').classList.add('hidden');
    renderContacts();
    openConversation(key);
  }

  // ── Misc ──────────────────────────────────────────────────────────────────

  function copyMyKey() {
    navigator.clipboard.writeText(myPublicKey);
    const btn = document.getElementById('btn-copy-key');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }

  function logout() {
    localStorage.removeItem('privateKeyHex');
    localStorage.removeItem('publicKey');
    location.href = '/';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
