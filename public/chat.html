<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat E2EE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    aside {
      width: 260px;
      min-width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
    }

    .my-key-box {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #334155;
    }
    .my-key-box .label {
      font-size: 0.68rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }
    .my-key-row { display: flex; align-items: center; gap: 0.5rem; }
    .my-key-id {
      font-family: monospace;
      font-size: 0.8rem;
      color: #38bdf8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contacts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #334155;
    }
    .contacts-header span {
      font-size: 0.68rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #contacts-list { list-style: none; flex: 1; overflow-y: auto; }
    .contact-item {
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .contact-item:hover { background: #0f172a; }
    .contact-item.active { background: #0f172a; border-left-color: #38bdf8; }
    .contact-name { font-size: 0.9rem; }
    .contact-key  { font-size: 0.7rem; font-family: monospace; color: #64748b; margin-top: 1px; }

    .sidebar-footer { padding: 0.75rem 1rem; border-top: 1px solid #334155; }

    /* ── Main chat area ──────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 0.5rem;
      text-align: center;
      padding: 2rem;
    }
    #empty-state .icon { font-size: 2.5rem; }

    #chat-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-pane.hidden { display: none; }

    #chat-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #334155;
      background: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    #chat-header .name { font-weight: 600; }
    .e2ee-badge {
      font-size: 0.7rem;
      background: #064e3b;
      color: #34d399;
      border: 1px solid #059669;
      padding: 1px 7px;
      border-radius: 999px;
    }
    #chat-header .key-hint {
      font-size: 0.72rem;
      color: #475569;
      font-family: monospace;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .msg { max-width: 70%; padding: 0.5rem 0.75rem; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; }
    .msg .text { word-break: break-word; }
    .msg .time { font-size: 0.7rem; margin-top: 3px; opacity: 0.55; }

    .msg.mine   { background: #1d4ed8; align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg.theirs { background: #1e293b; border: 1px solid #334155; align-self: flex-start; border-bottom-left-radius: 3px; }

    .input-row {
      padding: 0.75rem 1rem;
      border-top: 1px solid #334155;
      background: #1e293b;
      display: flex;
      gap: 0.5rem;
    }
    #msg-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
    }
    #msg-input:focus { outline: none; border-color: #38bdf8; }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .modal h3 { color: #f1f5f9; font-size: 1rem; }

    /* ── Shared ──────────────────────────────────── */
    button {
      background: #334155;
      border: none;
      color: #e2e8f0;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    button:hover { background: #475569; }
    button.primary { background: #38bdf8; color: #0f172a; font-weight: 600; }
    button.primary:hover { background: #7dd3fc; }
    button.danger { background: #7f1d1d; color: #fca5a5; }
    button.danger:hover { background: #991b1b; }

    label { font-size: 0.85rem; color: #94a3b8; }
    textarea, input[type="text"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      font-size: 0.8rem;
      resize: vertical;
    }
    textarea:focus, input:focus { outline: none; border-color: #38bdf8; }

    .error { color: #f87171; font-size: 0.85rem; }
    .hidden { display: none !important; }

    #loading-screen {
      position: fixed; inset: 0;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: #64748b;
    }
  </style>
</head>
<body>

<!-- Shown while we compute the public key from the stored hex private key -->
<div id="loading-screen">Loading keys…</div>

<!-- ── Sidebar ───────────────────────────────────── -->
<aside>
  <div class="my-key-box">
    <div class="label">Your public key (share this)</div>
    <div class="my-key-row">
      <span class="my-key-id" id="my-key-display"></span>
      <button id="btn-copy-key" onclick="copyMyKey()">Copy</button>
    </div>
  </div>

  <div class="contacts-header">
    <span>Contacts</span>
    <button onclick="openModal()">+ Add</button>
  </div>

  <ul id="contacts-list"></ul>

  <div class="sidebar-footer">
    <button class="danger" style="width:100%" onclick="logout()">Logout</button>
  </div>
</aside>

<!-- ── Main area ─────────────────────────────────── -->
<main>
  <div id="empty-state">
    <div class="icon">💬</div>
    <p>Select a contact or add one to start chatting.</p>
    <p style="font-size:0.8rem;margin-top:0.25rem">All messages are encrypted before they leave your browser.</p>
  </div>

  <div id="chat-pane" class="hidden">
    <div id="chat-header">
      <span class="name" id="chat-name"></span>
      <span class="e2ee-badge">🔒 E2EE</span>
      <span class="key-hint" id="chat-key-hint"></span>
    </div>
    <div id="messages"></div>
    <div class="input-row">
      <input id="msg-input" type="text" placeholder="Type a message…" onkeydown="onEnter(event)" />
      <button class="primary" onclick="sendMessage()">Send</button>
    </div>
  </div>
</main>

<!-- ── Add Contact Modal ─────────────────────────── -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <h3>Add Contact</h3>
    <label>Their Public Key</label>
    <textarea id="contact-key-input" rows="4" placeholder="Paste their public key (base64)…"></textarea>
    <label>Nickname <span style="color:#475569">(optional)</span></label>
    <input type="text" id="contact-name-input" placeholder="e.g. Alice" />
    <p id="modal-error" class="error hidden"></p>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end">
      <button onclick="document.getElementById('modal-overlay').classList.add('hidden')">Cancel</button>
      <button class="primary" onclick="addContact()">Add</button>
    </div>
  </div>
</div>

<script src="crypto.js"></script>
<script>
  // ── Bootstrap ─────────────────────────────────────────────────────────────
  //
  // We store only the hex private key in localStorage.
  // On every page load, we re-derive the CryptoKey from it.
  // This keeps the sensitive CryptoKey object out of storage
  // (it lives only in memory for this session).

  const myPrivateHex = localStorage.getItem('privateKeyHex');
  const myPublicKey  = localStorage.getItem('publicKey');

  if (!myPrivateHex || !myPublicKey) {
    location.href = '/';
  }

  let privateCryptoKey = null; // set during init below

  // contacts: { [publicKeyB64]: { name } }
  let contacts = JSON.parse(localStorage.getItem('contacts') || '{}');

  // Message store: { [contactPublicKeyB64]: [{ id, dir, text, ts }] }
  // dir = 'in' | 'out'
  const msgStore = {};

  let activeContact = null;
  let ws = null;

  // ── Async init ────────────────────────────────────────────────────────────

  (async () => {
    try {
      // Re-derive CryptoKey from the stored hex private key.
      // This also re-computes the public key via P-256 EC math.
      const result = await E2EE.importFromHex(myPrivateHex);
      privateCryptoKey = result.privateCryptoKey;

      // UI
      document.getElementById('my-key-display').textContent = E2EE.shortId(myPublicKey);
      document.getElementById('loading-screen').style.display = 'none';

      renderContacts();
      connectWS();
    } catch (e) {
      console.error('Key import failed:', e);
      // Key is corrupt or invalid — force logout
      logout();
    }
  })();

  // ── WebSocket ─────────────────────────────────────────────────────────────

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}`);

    ws.onopen = () => {
      // Send only our public key — never the private key
      ws.send(JSON.stringify({ type: 'identify', publicKey: myPublicKey }));
    };

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === 'history') {
        for (const m of msg.messages) await handleIncoming(m);
        renderMessages();
      }
      if (msg.type === 'message') {
        await handleIncoming(msg);
        renderMessages();
      }
    };

    ws.onclose = () => setTimeout(connectWS, 2000);
  }

  /**
   * Handle a message record (either from history or live).
   *
   * With ECDH, the shared secret between Alice and Bob is symmetric:
   *   ECDH(Alice_priv, Bob_pub) == ECDH(Bob_priv, Alice_pub)
   *
   * So Alice can decrypt BOTH messages she sent to Bob (using her private key
   * + Bob's public key) AND messages she received from Bob. No special-casing needed.
   */
  async function handleIncoming(m) {
    const isMine     = m.senderKey === myPublicKey;
    const contactKey = isMine ? m.recipientKey : m.senderKey;

    if (!msgStore[contactKey]) msgStore[contactKey] = [];
    if (msgStore[contactKey].find(x => x.id === m.id)) return; // duplicate

    let text;
    try {
      // contactKey is the other party's public key — used for ECDH on both sides
      text = await E2EE.decryptMessage(m.encrypted, privateCryptoKey, contactKey);
    } catch {
      text = '⚠️ Could not decrypt.';
    }

    msgStore[contactKey].push({
      id:  m.id,
      dir: isMine ? 'out' : 'in',
      text,
      ts:  m.timestamp,
    });
  }

  // ── Contacts ──────────────────────────────────────────────────────────────

  function renderContacts() {
    const list = document.getElementById('contacts-list');
    list.innerHTML = '';
    for (const [key, { name }] of Object.entries(contacts)) {
      const li = document.createElement('li');
      li.className = 'contact-item' + (key === activeContact ? ' active' : '');
      li.innerHTML = `
        <div class="contact-name">${esc(name)}</div>
        <div class="contact-key">${E2EE.shortId(key)}</div>
      `;
      li.onclick = () => openConversation(key);
      list.appendChild(li);
    }
  }

  function openConversation(key) {
    activeContact = key;
    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('chat-pane').classList.remove('hidden');
    document.getElementById('chat-name').textContent    = contacts[key]?.name || E2EE.shortId(key);
    document.getElementById('chat-key-hint').textContent = E2EE.shortId(key);
    renderContacts();
    renderMessages();
    document.getElementById('msg-input').focus();
  }

  // ── Messages ──────────────────────────────────────────────────────────────

  function renderMessages() {
    if (!activeContact) return;
    const msgs      = (msgStore[activeContact] || []).slice().sort((a, b) => a.ts < b.ts ? -1 : 1);
    const container = document.getElementById('messages');

    container.innerHTML = msgs.map(m => `
      <div class="msg ${m.dir === 'out' ? 'mine' : 'theirs'}">
        <div class="text">${esc(m.text)}</div>
        <div class="time">${fmtTime(m.ts)}</div>
      </div>
    `).join('');

    container.scrollTop = container.scrollHeight;
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !activeContact || !privateCryptoKey) return;
    input.value = '';

    const ts = new Date().toISOString();

    // Encrypt before sending — server only ever sees the ciphertext
    let encrypted;
    try {
      encrypted = await E2EE.encryptMessage(text, privateCryptoKey, activeContact);
    } catch (e) {
      alert('Encryption failed: ' + e.message);
      return;
    }

    ws.send(JSON.stringify({ type: 'send', recipientKey: activeContact, encrypted }));

    // Optimistic bubble — show immediately without waiting for server echo
    if (!msgStore[activeContact]) msgStore[activeContact] = [];
    msgStore[activeContact].push({ id: `local-${Date.now()}`, dir: 'out', text, ts });
    renderMessages();
  }

  function onEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── Add Contact ───────────────────────────────────────────────────────────

  function openModal() {
    document.getElementById('contact-key-input').value  = '';
    document.getElementById('contact-name-input').value = '';
    document.getElementById('modal-error').classList.add('hidden');
    document.getElementById('modal-overlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('contact-key-input').focus(), 50);
  }

  function maybeCloseModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
  }

  async function addContact() {
    const key     = document.getElementById('contact-key-input').value.trim();
    const name    = document.getElementById('contact-name-input').value.trim();
    const errorEl = document.getElementById('modal-error');
    errorEl.classList.add('hidden');

    if (!key) {
      errorEl.textContent = 'Paste a public key.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (key === myPublicKey) {
      errorEl.textContent = "That's your own public key.";
      errorEl.classList.remove('hidden');
      return;
    }

    try {
      await E2EE.validatePublicKey(key);
    } catch {
      errorEl.textContent = 'Invalid public key format.';
      errorEl.classList.remove('hidden');
      return;
    }

    contacts[key] = { name: name || E2EE.shortId(key) };
    localStorage.setItem('contacts', JSON.stringify(contacts));
    document.getElementById('modal-overlay').classList.add('hidden');
    renderContacts();
    openConversation(key);
  }

  // ── Misc ──────────────────────────────────────────────────────────────────

  function copyMyKey() {
    navigator.clipboard.writeText(myPublicKey);
    const btn = document.getElementById('btn-copy-key');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }

  function logout() {
    localStorage.removeItem('privateKeyHex');
    localStorage.removeItem('publicKey');
    location.href = '/';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
